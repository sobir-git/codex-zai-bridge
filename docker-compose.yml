services:
  zai-upstream:
    image: nginx:1.27-alpine
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./config/zai-nginx.conf:/etc/nginx/nginx.conf:ro

  responses-server:
    build:
      context: ./adapter
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "1000:1000"
    depends_on:
      - zai-upstream
    ports:
      - "127.0.0.1:${CODEX_ZAI_PORT:-18081}:8080"
    tmpfs:
      - /tmp
      - /app/log
    environment:
      OPENAI_BASE_URL_INTERNAL: http://zai-upstream:8081
      OPENAI_BASE_URL: http://127.0.0.1:${CODEX_ZAI_PORT:-18081}
      OPENAI_API_KEY: ${ZAI_API_KEY}
      API_ADAPTER_HOST: 0.0.0.0
      API_ADAPTER_PORT: 8080
      MCP_SERVERS_CONFIG_PATH: /app/src/open_responses_server/servers_config.empty.json
      LOG_LEVEL: INFO
      LOG_FILE_PATH: /tmp/api_adapter.log
      STREAM_TIMEOUT: 300
